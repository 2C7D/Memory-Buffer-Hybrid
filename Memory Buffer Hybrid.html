<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Buffer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Departure+Mono&display=swap');

  :root {
    --bg:        #0d0d0d;
    --bg1:       #141414;
    --bg2:       #1a1a1a;
    --bg3:       #222222;
    --border:    #2a2a2a;
    --border2:   #363636;
    --text:      #d4d4d4;
    --text-dim:  #5a5a5a;
    --text-mid:  #888888;
    --accent:    #e8c547;
    --accent2:   #c4a832;
    --danger:    #c0392b;
    --danger2:   #e74c3c;
    --green:     #27ae60;
    --blue:      #2980b9;
    --eph-color: #e74c3c;
    --font:      'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* TITLEBAR */
  #titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
    height: 36px;
    flex-shrink: 0;
  }
  #titlebar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #app-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  #eph-badge {
    display: none;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--eph-color);
    border: 1px solid var(--eph-color);
    padding: 1px 6px;
    animation: blink 1.4s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #save-status {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* LEFT PANEL */
  #left-panel {
    width: 240px;
    min-width: 160px;
    max-width: 400px;
    background: var(--bg1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  #left-header {
    padding: 10px 12px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #left-title {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #search-wrap {
    display: flex;
    align-items: center;
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 4px 8px;
    gap: 6px;
  }
  #search-wrap span { color: var(--text-dim); font-size: 10px; }
  #folder-search {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    width: 100%;
  }
  #folder-search::placeholder { color: var(--text-dim); }

  #folder-tree {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #folder-tree::-webkit-scrollbar { width: 4px; }
  #folder-tree::-webkit-scrollbar-track { background: transparent; }
  #folder-tree::-webkit-scrollbar-thumb { background: var(--border2); }

  .tree-item {
    display: flex;
    align-items: center;
    padding: 3px 0;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
  }
  .tree-item:hover { background: var(--bg2); }
  .tree-item.selected { background: var(--bg3); }
  .tree-item.selected .item-name { color: var(--accent); }
  .tree-item .indent { display: inline-block; width: 16px; flex-shrink: 0; }
  .tree-item .toggle-icon {
    width: 14px;
    flex-shrink: 0;
    color: var(--text-dim);
    font-size: 9px;
    text-align: center;
  }
  .tree-item .item-icon {
    width: 16px;
    flex-shrink: 0;
    text-align: center;
    font-size: 11px;
  }
  .tree-item .item-name {
    color: var(--text);
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    padding-right: 8px;
  }
  .tree-item .item-name.is-folder { color: var(--text-mid); font-weight: 500; }
  .tree-item input.rename-input {
    background: var(--bg3);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    padding: 0 4px;
    width: 130px;
  }

  #left-footer {
    border-top: 1px solid var(--border);
    padding: 6px 10px;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .tree-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text-mid);
    font-family: var(--font);
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    flex: 1;
    text-align: center;
  }
  .tree-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* RESIZE HANDLE */
  #resize-handle {
    width: 4px;
    background: transparent;
    cursor: col-resize;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  #resize-handle:hover { background: var(--accent); }

  /* RIGHT PANEL */
  #right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
    background: var(--bg);
  }
  #note-header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    flex-shrink: 0;
    min-height: 38px;
    background: var(--bg1);
  }
  #note-path {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #note-path .path-part { color: var(--text-mid); }
  #note-path .path-sep { color: var(--text-dim); margin: 0 3px; }
  #note-path .path-name { color: var(--text); }

  #note-content {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.7;
    padding: 20px 24px;
    border: none;
    outline: none;
    resize: none;
    overflow-y: auto;
    user-select: text;
    tab-size: 2;
  }
  #note-content::-webkit-scrollbar { width: 4px; }
  #note-content::-webkit-scrollbar-track { background: transparent; }
  #note-content::-webkit-scrollbar-thumb { background: var(--border2); }
  #note-content::placeholder { color: var(--text-dim); font-style: italic; }

  body.ephemeral #note-content {
    border-left: 2px solid var(--eph-color);
  }

  /* APPEND BAR */
  #append-section {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    background: var(--bg1);
    flex-shrink: 0;
  }
  #append-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  #append-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    user-select: text;
  }
  #append-input:focus { border-color: var(--accent); }
  #append-input::placeholder { color: var(--text-dim); }
  #append-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text-mid);
    font-family: var(--font);
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 0.06em;
  }
  #append-btn:hover { border-color: var(--accent); color: var(--accent); }

  #action-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .action-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text-mid);
    font-family: var(--font);
    font-size: 10px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--text-mid); color: var(--text); }
  #btn-ephemeral { border-color: var(--border2); }
  #btn-ephemeral.active {
    border-color: var(--eph-color);
    color: var(--eph-color);
    background: rgba(231,76,60,0.08);
  }
  #btn-save {
    border-color: var(--border2);
    margin-left: auto;
  }
  #btn-save:hover { border-color: var(--accent); color: var(--accent); }
  #btn-new {
    border-color: var(--border2);
  }
  #btn-new:hover { border-color: var(--green); color: var(--green); }

  /* MODAL */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--bg1);
    border: 1px solid var(--border2);
    padding: 24px;
    min-width: 320px;
    max-width: 480px;
  }
  #modal h3 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  #modal input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    margin-bottom: 16px;
  }
  #modal input:focus { border-color: var(--accent); }
  #modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text-mid);
    font-family: var(--font);
    font-size: 11px;
    padding: 6px 16px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .modal-btn.primary { border-color: var(--accent); color: var(--accent); }
  .modal-btn.danger { border-color: var(--danger2); color: var(--danger2); }
  .modal-btn:hover { opacity: 0.8; }

  /* CONTEXT MENU */
  #ctx-menu {
    display: none;
    position: fixed;
    background: var(--bg2);
    border: 1px solid var(--border2);
    z-index: 200;
    min-width: 160px;
    padding: 4px 0;
  }
  .ctx-item {
    padding: 6px 14px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
  }
  .ctx-item:hover { background: var(--bg3); color: var(--text); }
  .ctx-item.danger:hover { color: var(--danger2); }
  .ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }

  /* NOTE NAME IN PATH */
  #note-name-display {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #note-title-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    outline: none;
    padding: 0 2px;
    min-width: 80px;
    max-width: 300px;
    user-select: text;
  }
  #note-title-input:focus { border-bottom-color: var(--accent); }
</style>
</head>
<body>

<div id="titlebar">
  <div id="titlebar-left">
    <span id="app-name">Memory Buffer</span>
    <span id="eph-badge">⚡ EPHEMERAL</span>
  </div>
  <span id="save-status"></span>
</div>

<div id="main">
  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div id="left-header">
      <div id="left-title">Folders</div>
      <div id="search-wrap">
        <span>⌕</span>
        <input type="text" id="folder-search" placeholder="filter..." spellcheck="false">
      </div>
    </div>
    <div id="folder-tree"></div>
    <div id="left-footer">
      <button class="tree-btn" id="btn-new-folder" title="Ctrl+Shift+F">+ Folder</button>
      <button class="tree-btn" id="btn-new-note-tree" title="Ctrl+N">+ Note</button>
    </div>
  </div>

  <div id="resize-handle"></div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div id="note-header">
      <div id="note-path">
        <span class="path-name">New Note</span>
      </div>
      <input type="text" id="note-title-input" placeholder="untitled" spellcheck="false" title="Note name (click to rename)">
    </div>

    <textarea id="note-content" placeholder="Start writing...&#10;&#10;Ctrl+N — new note&#10;Ctrl+E — ephemeral mode&#10;Ctrl+↓ — focus append bar" spellcheck="false"></textarea>

    <div id="append-section">
      <div id="append-row">
        <input type="text" id="append-input" placeholder="Append new thought... (Enter to append)" spellcheck="false">
        <button id="append-btn">↵ Append</button>
      </div>
      <div id="action-row">
        <button class="action-btn" id="btn-ephemeral" title="Ctrl+E">⚡ Ephemeral</button>
        <button class="action-btn" id="btn-misc" title="Ctrl+M">📁 Misc</button>
        <button class="action-btn" id="btn-new" title="Ctrl+N">+ New</button>
        <button class="action-btn" id="btn-export" title="Export all notes as JSON">↑ Export</button>
        <button class="action-btn" id="btn-import" title="Load a JSON backup">↓ Import</button>
        <input type="file" id="import-file-input" accept=".json" style="display:none">
        <button class="action-btn" id="btn-save" title="Ctrl+S">💾 Save</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Prompt</h3>
    <input type="text" id="modal-input" spellcheck="false">
    <div id="modal-actions">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-rename">Rename (F2)</div>
  <div class="ctx-item" id="ctx-new-note">New Note Here</div>
  <div class="ctx-item" id="ctx-new-subfolder">New Subfolder</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" id="ctx-delete">Delete (Del)</div>
</div>

<script>
/* ============================================================
   MEMORY BUFFER — Complete App Logic
   ============================================================ */

const DB_KEY = 'memoryBufferData';

// ── STATE ──────────────────────────────────────────────────
let state = {
  data: null,           // { folders: {...} }
  currentNote: null,    // { path: [...], name: 'file.txt', content: '...' }
  ephemeral: false,
  selectedFolder: null, // array of folder path keys
  selectedItem: null,   // { path: [...], name, isFolder }
  filterText: '',
  saveTimer: null,
  unsaved: false,
  isNew: true,          // current note not yet persisted
};

// ── DOM ────────────────────────────────────────────────────
const folderTree = document.getElementById('folder-tree');
const noteContent = document.getElementById('note-content');
const notePathEl = document.getElementById('note-path');
const noteTitleInput = document.getElementById('note-title-input');
const folderSearch = document.getElementById('folder-search');
const appendInput = document.getElementById('append-input');
const saveStatus = document.getElementById('save-status');
const ephBadge = document.getElementById('eph-badge');
const btnEph = document.getElementById('btn-ephemeral');
const modalOverlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalInput = document.getElementById('modal-input');
const modalOk = document.getElementById('modal-ok');
const modalCancel = document.getElementById('modal-cancel');
const ctxMenu = document.getElementById('ctx-menu');

// ── STORAGE ────────────────────────────────────────────────
function loadData() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData() {
  localStorage.setItem(DB_KEY, JSON.stringify(state.data));
}

function defaultData() {
  return {
    folders: {
      'Informatics': {
        subfolders: {
          '0-VoidBorn': { subfolders: {}, notes: {} },
          '1-Upscaler':  { subfolders: {}, notes: {} },
        },
        notes: {}
      },
      'Psychology': { subfolders: {}, notes: {} },
      'Mathematics': { subfolders: {}, notes: {} },
      'Misc': { subfolders: {}, notes: {} }
    }
  };
}

// ── PATH HELPERS ───────────────────────────────────────────
// path = array of folder names from root
// e.g. ['Informatics', '0-VoidBorn']
function getFolderAtPath(path) {
  let node = state.data.folders;
  for (let i = 0; i < path.length; i++) {
    if (!node[path[i]]) return null;
    node = node[path[i]];
    if (i < path.length - 1) node = node.subfolders;
  }
  return node;
}

function getFolderParentAndKey(path) {
  if (path.length === 0) return null;
  if (path.length === 1) {
    return { parent: state.data.folders, key: path[0] };
  }
  let node = state.data.folders;
  for (let i = 0; i < path.length - 2; i++) {
    node = node[path[i]].subfolders;
  }
  return { parent: node[path[path.length - 2]].subfolders, key: path[path.length - 1] };
}

function getNoteContent(folderPath, noteName) {
  const folder = getFolderAtPath(folderPath);
  if (!folder) return '';
  return folder.notes[noteName] || '';
}

function setNoteContent(folderPath, noteName, content) {
  const folder = getFolderAtPath(folderPath);
  if (!folder) return;
  folder.notes[noteName] = content;
}

function deleteNote(folderPath, noteName) {
  const folder = getFolderAtPath(folderPath);
  if (!folder) return;
  delete folder.notes[noteName];
}

function renameNote(folderPath, oldName, newName) {
  const folder = getFolderAtPath(folderPath);
  if (!folder) return;
  const content = folder.notes[oldName];
  delete folder.notes[oldName];
  folder.notes[newName] = content;
}

function pathString(path) {
  return path.join(' / ');
}

// ── TIMESTAMP ──────────────────────────────────────────────
function nowStamp() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
}
function timeHHMM() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function sanitizeName(s) {
  return s.replace(/[<>:"/\\|?*\x00-\x1f]/g, '-').trim().slice(0, 120) || 'untitled';
}

// ── MODAL ──────────────────────────────────────────────────
let modalResolve = null;
function showModal(title, defaultVal = '') {
  return new Promise(resolve => {
    modalResolve = resolve;
    modalTitle.textContent = title;
    modalInput.value = defaultVal;
    modalOverlay.classList.add('open');
    setTimeout(() => { modalInput.focus(); modalInput.select(); }, 50);
  });
}
function closeModal(val) {
  modalOverlay.classList.remove('open');
  if (modalResolve) { modalResolve(val); modalResolve = null; }
}
modalOk.addEventListener('click', () => closeModal(modalInput.value.trim()));
modalCancel.addEventListener('click', () => closeModal(null));
modalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); closeModal(modalInput.value.trim()); }
  if (e.key === 'Escape') closeModal(null);
});

// ── SAVE STATUS ────────────────────────────────────────────
function setSaveStatus(msg, color) {
  saveStatus.textContent = msg;
  saveStatus.style.color = color || 'var(--text-dim)';
}

// ── RENDER TREE ────────────────────────────────────────────
function renderTree() {
  folderTree.innerHTML = '';
  const filter = state.filterText.toLowerCase();
  renderFolderLevel(state.data.folders, [], 0, filter);
}

function renderFolderLevel(folders, path, depth, filter) {
  for (const fname of Object.keys(folders).sort()) {
    const folder = folders[fname];
    const fpath = [...path, fname];

    const allNames = getAllNamesUnder(folder);
    const matchFolder = fname.toLowerCase().includes(filter);
    const matchAny = matchFolder || allNames.some(n => n.toLowerCase().includes(filter));

    if (filter && !matchAny) continue;

    // Folder row
    const isExpanded = isPathExpanded(fpath);
    const row = document.createElement('div');
    row.className = 'tree-item';
    row.dataset.path = JSON.stringify(fpath);
    row.dataset.isFolder = 'true';

    const selPath = state.selectedItem;
    if (selPath && selPath.isFolder && JSON.stringify(selPath.path) === JSON.stringify(fpath)) {
      row.classList.add('selected');
    }

    const hasSubs = Object.keys(folder.subfolders || {}).length > 0;
    const hasNotes = Object.keys(folder.notes || {}).length > 0;
    const hasChildren = hasSubs || hasNotes;

    let html = '';
    for (let i = 0; i < depth; i++) html += '<span class="indent"></span>';
    html += `<span class="toggle-icon">${hasChildren ? (isExpanded ? '▼' : '▶') : ' '}</span>`;
    html += `<span class="item-icon">📁</span>`;
    html += `<span class="item-name is-folder">${escHtml(fname)}</span>`;
    row.innerHTML = html;

    row.addEventListener('click', e => { e.stopPropagation(); onFolderClick(fpath, row); });
    row.addEventListener('dblclick', e => { e.stopPropagation(); startRename(row, fpath, null); });
    row.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e, fpath, null); });

    folderTree.appendChild(row);

    if (isExpanded || filter) {
      // Notes in this folder
      for (const nname of Object.keys(folder.notes || {}).sort()) {
        if (filter && !nname.toLowerCase().includes(filter) && !matchFolder) continue;
        const nrow = document.createElement('div');
        nrow.className = 'tree-item';
        nrow.dataset.path = JSON.stringify(fpath);
        nrow.dataset.note = nname;

        const cn = state.currentNote;
        if (cn && JSON.stringify(cn.path) === JSON.stringify(fpath) && cn.name === nname) {
          nrow.classList.add('selected');
        }

        let nhtml = '';
        for (let i = 0; i <= depth; i++) nhtml += '<span class="indent"></span>';
        nhtml += '<span class="toggle-icon"> </span>';
        nhtml += '<span class="item-icon">📄</span>';
        nhtml += `<span class="item-name">${escHtml(nname)}</span>`;
        nrow.innerHTML = nhtml;

        nrow.addEventListener('click', e => { e.stopPropagation(); openNote(fpath, nname); });
        nrow.addEventListener('dblclick', e => { e.stopPropagation(); startRename(nrow, fpath, nname); });
        nrow.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e, fpath, nname); });

        folderTree.appendChild(nrow);
      }

      // Subfolders
      if (folder.subfolders) {
        renderFolderLevel(folder.subfolders, fpath, depth + 1, filter);
      }
    }
  }
}

function getAllNamesUnder(folder) {
  const names = [];
  if (folder.notes) names.push(...Object.keys(folder.notes));
  if (folder.subfolders) {
    for (const sf of Object.values(folder.subfolders)) {
      names.push(...getAllNamesUnder(sf));
    }
  }
  return names;
}

// ── EXPAND STATE ───────────────────────────────────────────
const expandedPaths = new Set();

function isPathExpanded(path) {
  return expandedPaths.has(JSON.stringify(path));
}
function toggleExpand(path) {
  const key = JSON.stringify(path);
  if (expandedPaths.has(key)) expandedPaths.delete(key);
  else expandedPaths.add(key);
}

// ── FOLDER CLICK ───────────────────────────────────────────
function onFolderClick(fpath, row) {
  state.selectedItem = { path: fpath, isFolder: true };
  state.selectedFolder = fpath;
  toggleExpand(fpath);
  renderTree();
}

// ── OPEN NOTE ──────────────────────────────────────────────
function openNote(fpath, nname) {
  // Auto-save current before switching
  if (!state.ephemeral && state.currentNote && !state.isNew) {
    persistCurrentNote();
  }

  const content = getNoteContent(fpath, nname);
  state.currentNote = { path: fpath, name: nname, content: content };
  state.isNew = false;
  state.selectedItem = { path: fpath, name: nname, isFolder: false };
  state.selectedFolder = fpath;

  noteContent.value = content;
  updateNoteTitleDisplay(nname);
  updatePathDisplay(fpath, nname);
  renderTree();
}

function updateNoteTitleDisplay(nname) {
  noteTitleInput.value = nname ? nname.replace(/\.[^.]+$/, '') : '';
}

function updatePathDisplay(fpath, nname) {
  let html = '';
  if (fpath && fpath.length > 0) {
    fpath.forEach((p, i) => {
      html += `<span class="path-part">${escHtml(p)}</span>`;
      html += `<span class="path-sep">/</span>`;
    });
  }
  if (nname) html += `<span class="path-name">${escHtml(nname)}</span>`;
  else html += `<span class="path-name" style="color:var(--text-dim)">unsaved</span>`;
  notePathEl.innerHTML = html;
}

// ── NEW NOTE ───────────────────────────────────────────────
function newNote() {
  if (!state.ephemeral && state.currentNote && !state.isNew) {
    persistCurrentNote();
  }
  state.currentNote = { path: state.selectedFolder || null, name: null, content: '' };
  state.isNew = true;
  noteContent.value = '';
  noteTitleInput.value = '';
  updatePathDisplay(state.selectedFolder, null);
  noteContent.focus();
  setSaveStatus('new note', 'var(--text-dim)');
  renderTree();
}

// ── AUTO-SAVE ──────────────────────────────────────────────
function scheduleAutoSave() {
  if (state.ephemeral) return;
  clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(() => {
    if (state.currentNote) persistCurrentNote();
  }, 500);
}

function persistCurrentNote() {
  if (state.ephemeral) return;
  const content = noteContent.value;

  if (state.isNew) {
    // Determine name from title input or first line
    let name = noteTitleInput.value.trim();
    if (!name) {
      const firstLine = content.split('\n')[0].trim();
      name = firstLine ? sanitizeName(firstLine) : nowStamp();
    } else {
      name = sanitizeName(name);
    }
    if (!name.includes('.')) name += '.txt';

    const targetPath = state.selectedFolder || ['Misc'];
    ensureFolderPath(targetPath);
    const folder = getFolderAtPath(targetPath);
    folder.notes[name] = content;
    state.currentNote = { path: targetPath, name, content };
    state.isNew = false;
    updateNoteTitleDisplay(name);
    updatePathDisplay(targetPath, name);
    saveData();
    setSaveStatus('saved', 'var(--green)');
    renderTree();
  } else {
    // Update existing
    setNoteContent(state.currentNote.path, state.currentNote.name, content);
    state.currentNote.content = content;
    saveData();
    setSaveStatus('saved', 'var(--green)');
  }
  setTimeout(() => setSaveStatus(''), 1500);
}

function ensureFolderPath(path) {
  let node = state.data.folders;
  for (let i = 0; i < path.length; i++) {
    if (!node[path[i]]) {
      node[path[i]] = { subfolders: {}, notes: {} };
    }
    if (i < path.length - 1) node = node[path[i]].subfolders;
  }
}

// ── SAVE TO MISC ───────────────────────────────────────────
function saveToMisc() {
  const content = noteContent.value;
  const name = nowStamp() + '.txt';
  ensureFolderPath(['Misc']);
  state.data.folders['Misc'].notes[name] = content;
  saveData();
  setSaveStatus('→ Misc', 'var(--accent)');
  setTimeout(() => setSaveStatus(''), 1500);
  renderTree();
}

// ── APPEND ─────────────────────────────────────────────────
function doAppend() {
  const text = appendInput.value.trim();
  if (!text) return;
  const line = `> [${timeHHMM()}] ${text}`;
  const cur = noteContent.value;
  noteContent.value = cur + (cur && !cur.endsWith('\n') ? '\n' : '') + line + '\n';
  noteContent.scrollTop = noteContent.scrollHeight;
  appendInput.value = '';
  if (!state.ephemeral && state.currentNote) {
    if (state.isNew) persistCurrentNote();
    else scheduleAutoSave();
  }
}

// ── EPHEMERAL ──────────────────────────────────────────────
function toggleEphemeral() {
  state.ephemeral = !state.ephemeral;
  document.body.classList.toggle('ephemeral', state.ephemeral);
  ephBadge.style.display = state.ephemeral ? 'inline-block' : 'none';
  btnEph.classList.toggle('active', state.ephemeral);
}

// ── RENAME ─────────────────────────────────────────────────
function startRename(row, fpath, nname) {
  const nameEl = row.querySelector('.item-name');
  const oldName = nname || fpath[fpath.length - 1];
  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = oldName;
  nameEl.replaceWith(input);
  input.focus(); input.select();

  const finish = async () => {
    const newName = input.value.trim();
    input.blur();
    if (!newName || newName === oldName) { renderTree(); return; }
    if (nname) {
      // Rename note
      let finalName = sanitizeName(newName);
      if (!finalName.includes('.')) finalName += '.txt';
      renameNote(fpath, nname, finalName);
      if (state.currentNote && JSON.stringify(state.currentNote.path) === JSON.stringify(fpath) && state.currentNote.name === nname) {
        state.currentNote.name = finalName;
        updateNoteTitleDisplay(finalName);
        updatePathDisplay(fpath, finalName);
      }
    } else {
      // Rename folder
      const { parent, key } = getFolderParentAndKey(fpath);
      if (parent && !parent[newName]) {
        parent[newName] = parent[key];
        delete parent[key];
        // Update selected/current if affected
        if (state.selectedFolder) {
          const idx = fpath.length - 1;
          if (JSON.stringify(state.selectedFolder.slice(0, fpath.length)) === JSON.stringify(fpath)) {
            const nf = [...state.selectedFolder];
            nf[idx] = newName;
            state.selectedFolder = nf;
          }
        }
      }
    }
    saveData();
    renderTree();
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); finish(); }
    if (e.key === 'Escape') renderTree();
  });
}

// ── NEW FOLDER ─────────────────────────────────────────────
async function createFolder(parentPath) {
  const name = await showModal('New folder name:');
  if (!name) return;
  const sanitized = sanitizeName(name);
  if (parentPath && parentPath.length > 0) {
    ensureFolderPath(parentPath);
    const parent = getFolderAtPath(parentPath);
    if (!parent.subfolders) parent.subfolders = {};
    if (!parent.subfolders[sanitized]) {
      parent.subfolders[sanitized] = { subfolders: {}, notes: {} };
    }
    expandedPaths.add(JSON.stringify(parentPath));
  } else {
    if (!state.data.folders[sanitized]) {
      state.data.folders[sanitized] = { subfolders: {}, notes: {} };
    }
  }
  saveData();
  renderTree();
}

// ── DELETE ─────────────────────────────────────────────────
async function deleteSelected() {
  const sel = state.selectedItem;
  if (!sel) return;

  if (sel.isFolder) {
    // Don't allow Misc deletion
    if (sel.path.length === 1 && sel.path[0] === 'Misc') {
      setSaveStatus('Misc cannot be deleted', 'var(--danger2)');
      setTimeout(() => setSaveStatus(''), 1500);
      return;
    }
    const ok = confirm(`Delete folder "${sel.path[sel.path.length-1]}" and all its contents?`);
    if (!ok) return;
    const { parent, key } = getFolderParentAndKey(sel.path);
    if (parent) delete parent[key];
    state.selectedItem = null;
    state.selectedFolder = null;
  } else {
    const ok = confirm(`Delete note "${sel.name}"?`);
    if (!ok) return;
    deleteNote(sel.path, sel.name);
    if (state.currentNote && JSON.stringify(state.currentNote.path) === JSON.stringify(sel.path) && state.currentNote.name === sel.name) {
      newNote();
    }
    state.selectedItem = null;
  }
  saveData();
  renderTree();
}

// ── CONTEXT MENU ───────────────────────────────────────────
let ctxTarget = null;
function showCtxMenu(e, fpath, nname) {
  ctxTarget = { fpath, nname };
  state.selectedItem = nname
    ? { path: fpath, name: nname, isFolder: false }
    : { path: fpath, isFolder: true };
  renderTree();

  const isNote = !!nname;
  document.getElementById('ctx-new-note').style.display = isNote ? 'none' : 'block';
  document.getElementById('ctx-new-subfolder').style.display = isNote ? 'none' : 'block';

  ctxMenu.style.display = 'block';
  ctxMenu.style.left = Math.min(e.clientX, window.innerWidth - 170) + 'px';
  ctxMenu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
}
function hideCtxMenu() { ctxMenu.style.display = 'none'; ctxTarget = null; }
document.addEventListener('click', hideCtxMenu);
document.addEventListener('contextmenu', hideCtxMenu);

document.getElementById('ctx-rename').addEventListener('click', () => {
  if (!ctxTarget) return;
  // Find row and trigger rename
  const rows = folderTree.querySelectorAll('.tree-item');
  for (const row of rows) {
    const rpath = JSON.parse(row.dataset.path);
    const rnote = row.dataset.note;
    if (ctxTarget.nname && rnote === ctxTarget.nname && JSON.stringify(rpath) === JSON.stringify(ctxTarget.fpath)) {
      startRename(row, rpath, rnote); return;
    }
    if (!ctxTarget.nname && !rnote && JSON.stringify(rpath) === JSON.stringify(ctxTarget.fpath)) {
      startRename(row, rpath, null); return;
    }
  }
});
document.getElementById('ctx-new-note').addEventListener('click', async () => {
  if (!ctxTarget) return;
  state.selectedFolder = ctxTarget.fpath;
  newNote();
});
document.getElementById('ctx-new-subfolder').addEventListener('click', () => {
  if (!ctxTarget) return;
  createFolder(ctxTarget.fpath);
});
document.getElementById('ctx-delete').addEventListener('click', () => {
  if (!ctxTarget) return;
  if (ctxTarget.nname) {
    state.selectedItem = { path: ctxTarget.fpath, name: ctxTarget.nname, isFolder: false };
  } else {
    state.selectedItem = { path: ctxTarget.fpath, isFolder: true };
  }
  deleteSelected();
});

// ── NOTE TITLE RENAME ──────────────────────────────────────
noteTitleInput.addEventListener('change', () => {
  if (!state.currentNote || state.isNew) return;
  let newName = sanitizeName(noteTitleInput.value.trim());
  if (!newName) return;
  if (!newName.includes('.')) {
    // Preserve extension
    const ext = state.currentNote.name.match(/\.[^.]+$/);
    newName += ext ? ext[0] : '.txt';
  }
  if (newName === state.currentNote.name) return;
  renameNote(state.currentNote.path, state.currentNote.name, newName);
  state.currentNote.name = newName;
  updatePathDisplay(state.currentNote.path, newName);
  saveData();
  renderTree();
});

// ── NOTE CONTENT CHANGE ────────────────────────────────────
noteContent.addEventListener('input', () => {
  if (state.currentNote) state.currentNote.content = noteContent.value;
  scheduleAutoSave();
});

// ── APPEND ─────────────────────────────────────────────────
appendInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); doAppend(); }
  if (e.key === 'Escape') { appendInput.value = ''; noteContent.focus(); }
});
document.getElementById('append-btn').addEventListener('click', doAppend);

// ── BUTTON HANDLERS ────────────────────────────────────────
btnEph.addEventListener('click', toggleEphemeral);
document.getElementById('btn-misc').addEventListener('click', saveToMisc);
document.getElementById('btn-save').addEventListener('click', () => persistCurrentNote());
document.getElementById('btn-new').addEventListener('click', newNote);
document.getElementById('btn-new-folder').addEventListener('click', () => createFolder(state.selectedFolder));
document.getElementById('btn-new-note-tree').addEventListener('click', newNote);

// ── SEARCH ─────────────────────────────────────────────────
folderSearch.addEventListener('input', () => {
  state.filterText = folderSearch.value;
  renderTree();
});

// ── KEYBOARD SHORTCUTS ─────────────────────────────────────
document.addEventListener('keydown', e => {
  // Don't intercept when modal open
  if (modalOverlay.classList.contains('open')) return;

  const ctrl = e.ctrlKey || e.metaKey;

  if (ctrl && e.key === 'n') { e.preventDefault(); newNote(); return; }
  if (ctrl && e.key === 'e') { e.preventDefault(); toggleEphemeral(); return; }
  if (ctrl && e.key === 'm') { e.preventDefault(); saveToMisc(); return; }
  if (ctrl && e.key === 's') { e.preventDefault(); persistCurrentNote(); return; }
  if (ctrl && e.shiftKey && e.key === 'F') { e.preventDefault(); createFolder(state.selectedFolder); return; }
  if (ctrl && e.key === 'k') { e.preventDefault(); folderSearch.focus(); folderSearch.select(); return; }
  if (ctrl && e.key === 'ArrowDown') { e.preventDefault(); appendInput.focus(); return; }
  if (ctrl && e.key === 'Enter') { e.preventDefault(); doAppend(); return; }

  if (e.key === 'F2') {
    e.preventDefault();
    const sel = state.selectedItem;
    if (!sel) return;
    const rows = folderTree.querySelectorAll('.tree-item');
    for (const row of rows) {
      const rpath = JSON.parse(row.dataset.path);
      const rnote = row.dataset.note;
      if (sel.isFolder && !rnote && JSON.stringify(rpath) === JSON.stringify(sel.path)) {
        startRename(row, rpath, null); return;
      }
      if (!sel.isFolder && rnote === sel.name && JSON.stringify(rpath) === JSON.stringify(sel.path)) {
        startRename(row, rpath, rnote); return;
      }
    }
    return;
  }

  if (e.key === 'Delete' && document.activeElement !== noteContent && document.activeElement !== appendInput && document.activeElement !== noteTitleInput) {
    e.preventDefault();
    deleteSelected();
    return;
  }

  if (e.key === 'Escape') {
    if (document.activeElement === appendInput) {
      appendInput.value = '';
      noteContent.focus();
    }
    return;
  }
});

// ── RESIZE HANDLE ──────────────────────────────────────────
const resizeHandle = document.getElementById('resize-handle');
const leftPanel = document.getElementById('left-panel');
let resizing = false, startX = 0, startW = 0;
resizeHandle.addEventListener('mousedown', e => {
  resizing = true; startX = e.clientX; startW = leftPanel.offsetWidth;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!resizing) return;
  const w = Math.min(400, Math.max(160, startW + e.clientX - startX));
  leftPanel.style.width = w + 'px';
});
document.addEventListener('mouseup', () => {
  resizing = false;
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
});

// ── EXPORT ─────────────────────────────────────────────────
function exportJSON() {
  const json = JSON.stringify(state.data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = nowStamp().replace(/ /g, '_');
  a.href = url;
  a.download = `memory-buffer-${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
  setSaveStatus('exported', 'var(--accent)');
  setTimeout(() => setSaveStatus(''), 1500);
}

// ── IMPORT ─────────────────────────────────────────────────
function triggerImport() {
  document.getElementById('import-file-input').click();
}

document.getElementById('import-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const parsed = JSON.parse(evt.target.result);
      if (!parsed.folders) throw new Error('Invalid format: missing "folders" key.');
      const ok = confirm(`Load "${file.name}"?\n\nThis will REPLACE your current notes in localStorage. Current data will be lost unless you exported it first.`);
      if (!ok) return;
      state.data = parsed;
      if (!state.data.folders['Misc']) {
        state.data.folders['Misc'] = { subfolders: {}, notes: {} };
      }
      saveData();
      // Re-expand top level
      for (const fname of Object.keys(state.data.folders)) {
        expandedPaths.add(JSON.stringify([fname]));
      }
      newNote();
      renderTree();
      setSaveStatus('imported: ' + file.name, 'var(--green)');
      setTimeout(() => setSaveStatus(''), 2000);
    } catch(err) {
      alert('Failed to load file: ' + err.message);
    }
  };
  reader.readAsText(file);
  // Reset so same file can be re-loaded
  e.target.value = '';
});

document.getElementById('btn-export').addEventListener('click', exportJSON);
document.getElementById('btn-import').addEventListener('click', triggerImport);

// ── UTILS ──────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ───────────────────────────────────────────────────
function init() {
  const stored = loadData();
  state.data = stored || defaultData();

  // Ensure Misc exists
  if (!state.data.folders['Misc']) {
    state.data.folders['Misc'] = { subfolders: {}, notes: {} };
  }

  // Add welcome note if first time
  if (!stored) {
    state.data.folders['Informatics'].notes['Welcome.txt'] =
      '# Welcome to Memory Buffer\n\nA fast, keyboard-first notes app.\n\nShortcuts:\n  Ctrl+N       New note\n  Ctrl+E       Toggle ephemeral mode\n  Ctrl+S       Save\n  Ctrl+M       Save to Misc\n  Ctrl+K       Focus search\n  Ctrl+↓       Focus append bar\n  Ctrl+Enter   Append thought\n  F2           Rename selected\n  Del          Delete selected\n  Ctrl+Shift+F New folder\n\nDouble-click any note or folder to rename it.\nRight-click for context menu.';
    saveData();
  }

  // Expand top-level folders
  for (const fname of Object.keys(state.data.folders)) {
    expandedPaths.add(JSON.stringify([fname]));
  }

  renderTree();
  newNote();
  noteContent.focus();
}

init();
</script>
