<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Buffer · Tiled</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Departure+Mono&display=swap');

  :root {
    --bg:        #0d0d0d;
    --bg1:       #141414;
    --bg2:       #1a1a1a;
    --bg3:       #222222;
    --border:    #2a2a2a;
    --border2:   #363636;
    --text:      #d4d4d4;
    --text-dim:  #5a5a5a;
    --text-mid:  #888888;
    --accent:    #e8c547;
    --accent2:   #c4a832;
    --danger:    #c0392b;
    --danger2:   #e74c3c;
    --green:     #27ae60;
    --blue:      #2980b9;
    --eph-color: #e74c3c;
    --font:      'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* MAIN LAYOUT */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* LEFT PANEL */
  #left-panel {
    width: 240px;
    min-width: 160px;
    max-width: 400px;
    background: var(--bg1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  #left-header {
    padding: 10px 12px 6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #left-title {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #search-wrap {
    display: flex;
    align-items: center;
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 4px 8px;
    gap: 6px;
  }
  #search-wrap span { color: var(--text-dim); font-size: 10px; }
  #folder-search {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    width: 100%;
  }
  #folder-search::placeholder { color: var(--text-dim); }

  #folder-tree {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #folder-tree::-webkit-scrollbar { width: 4px; }
  #folder-tree::-webkit-scrollbar-track { background: transparent; }
  #folder-tree::-webkit-scrollbar-thumb { background: var(--border2); }

  .tree-item {
    display: flex;
    align-items: center;
    padding: 3px 0;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
  }
  .tree-item:hover { background: var(--bg2); }
  .tree-item.selected { background: var(--bg3); }
  .tree-item.selected .item-name { color: var(--accent); }
  .tree-item .indent { display: inline-block; width: 16px; flex-shrink: 0; }
  .tree-item .toggle-icon {
    width: 14px;
    flex-shrink: 0;
    color: var(--text-dim);
    font-size: 9px;
    text-align: center;
  }
  .tree-item .item-icon {
    width: 16px;
    flex-shrink: 0;
    text-align: center;
    font-size: 11px;
  }
  .tree-item .item-name {
    color: var(--text);
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    padding-right: 8px;
  }
  .tree-item .item-name.is-folder { color: var(--text-mid); font-weight: 500; }
  .tree-item input.rename-input {
    background: var(--bg3);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    padding: 0 4px;
    width: 130px;
  }

  #left-footer {
    border-top: 1px solid var(--border);
    padding: 6px 10px;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .tree-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text-mid);
    font-family: var(--font);
    font-size: 10px;
    padding: 3px 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    flex: 1;
    text-align: center;
  }
  .tree-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* RESIZE HANDLE */
  #resize-handle {
    width: 4px;
    background: transparent;
    cursor: col-resize;
    flex-shrink: 0;
    position: relative;
    z-index: 10;
  }
  #resize-handle:hover { background: var(--accent); }

  /* RIGHT PANEL – TILE CONTAINER */
  #tile-container {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    min-width: 0;
    background: var(--bg);
    gap: 0;
  }

  /* INDIVIDUAL TILE */
  .tile {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border-right: 1px solid var(--border);
    min-width: 120px;
    position: relative;
    transition: border-color 0.15s;
  }
  .tile:last-child { border-right: none; }
  .tile.focused {
    border: 2px solid var(--accent);
    box-shadow: 0 0 12px rgba(232, 197, 71, 0.15);
    z-index: 2;
  }
  .tile.ephemeral-tile .tile-content {
    border-left: 2px solid var(--eph-color);
  }

  .tile-header {
    display: flex;
    align-items: center;
    padding: 4px 10px 4px 14px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 30px;
    gap: 8px;
  }
  .tile-path {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tile-path .path-part { color: var(--text-mid); }
  .tile-path .path-sep { color: var(--text-dim); margin: 0 3px; }
  .tile-path .path-name { color: var(--text); }
  .tile-title-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid transparent;
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 500;
    outline: none;
    padding: 0 2px;
    min-width: 60px;
    max-width: 180px;
    user-select: text;
  }
  .tile-title-input:focus { border-bottom-color: var(--accent); }
  .tile-close {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    padding: 0 4px;
    border-radius: 2px;
  }
  .tile-close:hover {
    color: var(--danger2);
    background: rgba(231, 76, 60, 0.1);
  }

  .tile-content {
    flex: 1;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.7;
    padding: 14px 18px;
    border: none;
    outline: none;
    resize: none;
    overflow-y: auto;
    user-select: text;
    tab-size: 2;
    min-height: 0;
  }
  .tile-content::-webkit-scrollbar { width: 4px; }
  .tile-content::-webkit-scrollbar-track { background: transparent; }
  .tile-content::-webkit-scrollbar-thumb { background: var(--border2); }
  .tile-content::placeholder { color: var(--text-dim); font-style: italic; }

  /* APPEND BAR (global, applies to focused tile) */
  #append-section {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    background: var(--bg1);
    flex-shrink: 0;
  }
  #append-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  #append-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    user-select: text;
  }
  #append-input:focus { border-color: var(--accent); }
  #append-input::placeholder { color: var(--text-dim); }
  #append-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text-mid);
    font-family: var(--font);
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 0.06em;
  }
  #append-btn:hover { border-color: var(--accent); color: var(--accent); }

  #action-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .action-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text-mid);
    font-family: var(--font);
    font-size: 10px;
    padding: 4px 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .action-btn:hover { border-color: var(--text-mid); color: var(--text); }
  #btn-ephemeral { border-color: var(--border2); }
  #btn-ephemeral.active {
    border-color: var(--eph-color);
    color: var(--eph-color);
    background: rgba(231,76,60,0.08);
  }
  #btn-save {
    border-color: var(--border2);
    margin-left: auto;
  }
  #btn-save:hover { border-color: var(--accent); color: var(--accent); }
  #btn-new {
    border-color: var(--border2);
  }
  #btn-new:hover { border-color: var(--green); color: var(--green); }

  /* MODAL */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: var(--bg1);
    border: 1px solid var(--border2);
    padding: 24px;
    min-width: 320px;
    max-width: 480px;
  }
  #modal h3 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  #modal input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    margin-bottom: 16px;
  }
  #modal input:focus { border-color: var(--accent); }
  #modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text-mid);
    font-family: var(--font);
    font-size: 11px;
    padding: 6px 16px;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .modal-btn.primary { border-color: var(--accent); color: var(--accent); }
  .modal-btn.danger { border-color: var(--danger2); color: var(--danger2); }
  .modal-btn:hover { opacity: 0.8; }

  /* CONTEXT MENU */
  #ctx-menu {
    display: none;
    position: fixed;
    background: var(--bg2);
    border: 1px solid var(--border2);
    z-index: 200;
    min-width: 160px;
    padding: 4px 0;
  }
  .ctx-item {
    padding: 6px 14px;
    cursor: pointer;
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 0.04em;
  }
  .ctx-item:hover { background: var(--bg3); color: var(--text); }
  .ctx-item.danger:hover { color: var(--danger2); }
  .ctx-sep { height: 1px; background: var(--border); margin: 3px 0; }
</style>
</head>
<body>

<div id="main">
  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div id="left-header">
      <div id="left-title">Folders</div>
      <div id="search-wrap">
        <span>⌕</span>
        <input type="text" id="folder-search" placeholder="filter..." spellcheck="false">
      </div>
    </div>
    <div id="folder-tree"></div>
    <div id="left-footer">
      <button class="tree-btn" id="btn-new-folder" title="Ctrl+Shift+F">+ Folder</button>
      <button class="tree-btn" id="btn-new-note-tree" title="Ctrl+N">+ Note</button>
    </div>
  </div>

  <div id="resize-handle"></div>

  <!-- RIGHT PANEL - TILE CONTAINER -->
  <div id="tile-container"></div>
</div>

<!-- APPEND BAR (global) -->
<div id="append-section">
  <div id="append-row">
    <input type="text" id="append-input" placeholder="Append new thought... (Enter to append)" spellcheck="false">
    <button id="append-btn">↵ Append</button>
  </div>
  <div id="action-row">
    <button class="action-btn" id="btn-ephemeral" title="Ctrl+E">⚡ Ephemeral</button>
    <button class="action-btn" id="btn-misc" title="Ctrl+M">📁 Misc</button>
    <button class="action-btn" id="btn-new" title="Ctrl+N">+ New</button>
    <button class="action-btn" id="btn-export" title="Export all notes as JSON">↑ Export</button>
    <button class="action-btn" id="btn-import" title="Load a JSON backup">↓ Import</button>
    <input type="file" id="import-file-input" accept=".json" style="display:none">
    <button class="action-btn" id="btn-save" title="Ctrl+S">💾 Save</button>
  </div>
</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title">Prompt</h3>
    <input type="text" id="modal-input" spellcheck="false">
    <div id="modal-actions">
      <button class="modal-btn" id="modal-cancel">Cancel</button>
      <button class="modal-btn primary" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-rename">Rename (F2)</div>
  <div class="ctx-item" id="ctx-new-note">New Note Here</div>
  <div class="ctx-item" id="ctx-new-subfolder">New Subfolder</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" id="ctx-delete">Delete (Del)</div>
</div>

<script>
/* ============================================================
   MEMORY BUFFER — TILED NIRI‑STYLE (clean, no titlebar)
   ============================================================ */

const DB_KEY = 'memoryBufferData';

// ── STATE ──────────────────────────────────────────────────
let state = {
  data: null,
  tiles: [],
  focusedTileId: null,
  ephemeral: false,
  selectedFolder: null,
  filterText: '',
  saveTimers: {},
};

let tileIdCounter = 0;

// ── DOM ────────────────────────────────────────────────────
const tileContainer = document.getElementById('tile-container');
const folderTree = document.getElementById('folder-tree');
const folderSearch = document.getElementById('folder-search');
const appendInput = document.getElementById('append-input');
const ephBadge = document.getElementById('eph-badge');
const btnEph = document.getElementById('btn-ephemeral');
const modalOverlay = document.getElementById('modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalInput = document.getElementById('modal-input');
const modalOk = document.getElementById('modal-ok');
const modalCancel = document.getElementById('modal-cancel');
const ctxMenu = document.getElementById('ctx-menu');

// ── STORAGE ────────────────────────────────────────────────
function loadData() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveData() {
  localStorage.setItem(DB_KEY, JSON.stringify(state.data));
}

function defaultData() {
  return {
    folders: {
      'Informatics': {
        subfolders: {
          '0-Example': { subfolders: {}, notes: {} },
          '1-Example':  { subfolders: {}, notes: {} },
        },
        notes: {}
      },
      'Psychology': { subfolders: {}, notes: {} },
      'Mathematics': { subfolders: {}, notes: {} },
      'Misc': { subfolders: {}, notes: {} }
    }
  };
}

// ── PATH HELPERS ───────────────────────────────────────────
function getFolderAtPath(path) {
  let node = state.data.folders;
  for (let i = 0; i < path.length; i++) {
    if (!node[path[i]]) return null;
    node = node[path[i]];
    if (i < path.length - 1) node = node.subfolders;
  }
  return node;
}

function getFolderParentAndKey(path) {
  if (path.length === 0) return null;
  if (path.length === 1) {
    return { parent: state.data.folders, key: path[0] };
  }
  let node = state.data.folders;
  for (let i = 0; i < path.length - 2; i++) {
    node = node[path[i]].subfolders;
  }
  return { parent: node[path[path.length - 2]].subfolders, key: path[path.length - 1] };
}

function getNoteContent(folderPath, noteName) {
  const folder = getFolderAtPath(folderPath);
  if (!folder) return '';
  return folder.notes[noteName] || '';
}

function setNoteContent(folderPath, noteName, content) {
  const folder = getFolderAtPath(folderPath);
  if (!folder) return;
  folder.notes[noteName] = content;
}

function deleteNote(folderPath, noteName) {
  const folder = getFolderAtPath(folderPath);
  if (!folder) return;
  delete folder.notes[noteName];
}

function renameNote(folderPath, oldName, newName) {
  const folder = getFolderAtPath(folderPath);
  if (!folder) return;
  const content = folder.notes[oldName];
  delete folder.notes[oldName];
  folder.notes[newName] = content;
}

function ensureFolderPath(path) {
  let node = state.data.folders;
  for (let i = 0; i < path.length; i++) {
    if (!node[path[i]]) {
      node[path[i]] = { subfolders: {}, notes: {} };
    }
    if (i < path.length - 1) node = node[path[i]].subfolders;
  }
}

// ── TIMESTAMP ──────────────────────────────────────────────
function nowStamp() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}-${pad(d.getMinutes())}-${pad(d.getSeconds())}`;
}
function timeHHMM() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function sanitizeName(s) {
  return s.replace(/[<>:"/\\|?*\x00-\x1f]/g, '-').trim().slice(0, 120) || 'untitled';
}

// ── MODAL ──────────────────────────────────────────────────
let modalResolve = null;
function showModal(title, defaultVal = '') {
  return new Promise(resolve => {
    modalResolve = resolve;
    modalTitle.textContent = title;
    modalInput.value = defaultVal;
    modalOverlay.classList.add('open');
    setTimeout(() => { modalInput.focus(); modalInput.select(); }, 50);
  });
}
function closeModal(val) {
  modalOverlay.classList.remove('open');
  if (modalResolve) { modalResolve(val); modalResolve = null; }
}
modalOk.addEventListener('click', () => closeModal(modalInput.value.trim()));
modalCancel.addEventListener('click', () => closeModal(null));
modalInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); closeModal(modalInput.value.trim()); }
  if (e.key === 'Escape') closeModal(null);
});

// ── TILE MANAGEMENT ──────────────────────────────────────
function createTile(options = {}) {
  const id = ++tileIdCounter;
  const tile = {
    id,
    path: options.path || null,
    name: options.name || null,
    content: options.content || '',
    isNew: options.isNew !== undefined ? options.isNew : true,
  };
  state.tiles.push(tile);
  state.focusedTileId = id;
  renderTiles();
  focusTile(id);
  return tile;
}

function getFocusedTile() {
  return state.tiles.find(t => t.id === state.focusedTileId) || state.tiles[0] || null;
}

function focusTile(id) {
  state.focusedTileId = id;
  renderTiles();
  const el = document.querySelector(`.tile[data-tile-id="${id}"] .tile-content`);
  if (el) el.focus();
}

function closeTile(id) {
  if (state.tiles.length <= 1) {
    const tile = state.tiles[0];
    tile.path = null;
    tile.name = null;
    tile.content = '';
    tile.isNew = true;
    state.focusedTileId = tile.id;
    renderTiles();
    focusTile(tile.id);
    return;
  }
  const tile = state.tiles.find(t => t.id === id);
  if (tile && !state.ephemeral) persistTile(tile);
  state.tiles = state.tiles.filter(t => t.id !== id);
  if (state.focusedTileId === id) {
    state.focusedTileId = state.tiles[0]?.id || null;
  }
  renderTiles();
  if (state.focusedTileId) focusTile(state.focusedTileId);
}

function openNoteInTile(tile, fpath, nname) {
  if (!tile) return;
  if (!state.ephemeral) persistTile(tile);
  const content = getNoteContent(fpath, nname);
  tile.path = fpath;
  tile.name = nname;
  tile.content = content;
  tile.isNew = false;
  renderTiles();
  focusTile(tile.id);
}

function openNoteInFocusedTile(fpath, nname) {
  const focused = getFocusedTile();
  if (focused) openNoteInTile(focused, fpath, nname);
}

function persistTile(tile) {
  if (state.ephemeral) return;
  const content = tile.content;

  if (tile.isNew) {
    let name = tile.name || '';
    if (!name) {
      const firstLine = content.split('\n')[0].trim();
      name = firstLine ? sanitizeName(firstLine) : nowStamp();
    } else {
      name = sanitizeName(name);
    }
    if (!name.includes('.')) name += '.txt';

    const targetPath = tile.path || ['Misc'];
    ensureFolderPath(targetPath);
    const folder = getFolderAtPath(targetPath);
    folder.notes[name] = content;
    tile.path = targetPath;
    tile.name = name;
    tile.isNew = false;
    tile.content = content;
    saveData();
    renderTiles();
  } else {
    setNoteContent(tile.path, tile.name, content);
    tile.content = content;
    saveData();
  }
}

function newNoteTile() {
  const focused = getFocusedTile();
  if (focused && !state.ephemeral) persistTile(focused);
  const tile = createTile({
    path: state.selectedFolder || null,
    content: '',
    isNew: true,
  });
  tile.name = null;
  renderTiles();
  focusTile(tile.id);
}

// ── RENDER TILES ──────────────────────────────────────────
function renderTiles() {
  tileContainer.innerHTML = '';
  state.tiles.forEach(tile => {
    const div = document.createElement('div');
    div.className = 'tile';
    if (state.focusedTileId === tile.id) div.classList.add('focused');
    if (state.ephemeral) div.classList.add('ephemeral-tile');
    div.dataset.tileId = tile.id;

    // Header
    const header = document.createElement('div');
    header.className = 'tile-header';

    const pathSpan = document.createElement('span');
    pathSpan.className = 'tile-path';
    let html = '';
    if (tile.path && tile.path.length > 0) {
      tile.path.forEach((p, i) => {
        html += `<span class="path-part">${escHtml(p)}</span>`;
        html += `<span class="path-sep">/</span>`;
      });
    }
    if (tile.name) {
      html += `<span class="path-name">${escHtml(tile.name)}</span>`;
    } else {
      html += `<span class="path-name" style="color:var(--text-dim)">unsaved</span>`;
    }
    pathSpan.innerHTML = html;
    header.appendChild(pathSpan);

    const titleInput = document.createElement('input');
    titleInput.className = 'tile-title-input';
    titleInput.type = 'text';
    titleInput.placeholder = 'untitled';
    titleInput.value = tile.name ? tile.name.replace(/\.[^.]+$/, '') : '';
    titleInput.spellcheck = false;
    titleInput.title = 'Note name (click to rename)';
    header.appendChild(titleInput);

    const closeBtn = document.createElement('button');
    closeBtn.className = 'tile-close';
    closeBtn.textContent = '✕';
    closeBtn.title = 'Close tile';
    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      closeTile(tile.id);
    });
    header.appendChild(closeBtn);

    div.appendChild(header);

    const textarea = document.createElement('textarea');
    textarea.className = 'tile-content';
    textarea.value = tile.content;
    textarea.placeholder = 'Start writing...\n\nCtrl+N — new tile\nCtrl+E — ephemeral mode\nCtrl+↓ — focus append bar';
    textarea.spellcheck = false;
    textarea.dataset.tileId = tile.id;

    textarea.addEventListener('input', () => {
      tile.content = textarea.value;
      scheduleTileSave(tile.id);
    });

    textarea.addEventListener('focus', () => {
      if (state.focusedTileId !== tile.id) {
        state.focusedTileId = tile.id;
        renderTiles();
      }
    });

    div.appendChild(textarea);

    tileContainer.appendChild(div);
  });

  if (state.tiles.length === 0) {
    const tile = createTile({ path: ['Misc'], content: '', isNew: true });
    renderTiles();
    focusTile(tile.id);
  }
}

// ── TILE AUTO‑SAVE ──────────────────────────────────────────
function scheduleTileSave(tileId) {
  if (state.ephemeral) return;
  clearTimeout(state.saveTimers[tileId]);
  state.saveTimers[tileId] = setTimeout(() => {
    const tile = state.tiles.find(t => t.id === tileId);
    if (tile) persistTile(tile);
  }, 500);
}

// ── FOLDER TREE RENDER ─────────────────────────────────────
const expandedPaths = new Set();

function renderTree() {
  folderTree.innerHTML = '';
  const filter = state.filterText.toLowerCase();
  renderFolderLevel(state.data.folders, [], 0, filter);
}

function renderFolderLevel(folders, path, depth, filter) {
  for (const fname of Object.keys(folders).sort()) {
    const folder = folders[fname];
    const fpath = [...path, fname];

    const allNames = getAllNamesUnder(folder);
    const matchFolder = fname.toLowerCase().includes(filter);
    const matchAny = matchFolder || allNames.some(n => n.toLowerCase().includes(filter));

    if (filter && !matchAny) continue;

    const isExpanded = expandedPaths.has(JSON.stringify(fpath));
    const row = document.createElement('div');
    row.className = 'tree-item';
    row.dataset.path = JSON.stringify(fpath);
    row.dataset.isFolder = 'true';

    if (state.selectedFolder && JSON.stringify(state.selectedFolder) === JSON.stringify(fpath)) {
      row.classList.add('selected');
    }

    const hasSubs = Object.keys(folder.subfolders || {}).length > 0;
    const hasNotes = Object.keys(folder.notes || {}).length > 0;
    const hasChildren = hasSubs || hasNotes;

    let html = '';
    for (let i = 0; i < depth; i++) html += '<span class="indent"></span>';
    html += `<span class="toggle-icon">${hasChildren ? (isExpanded ? '▼' : '▶') : ' '}</span>`;
    html += `<span class="item-icon">📁</span>`;
    html += `<span class="item-name is-folder">${escHtml(fname)}</span>`;
    row.innerHTML = html;

    row.addEventListener('click', e => { e.stopPropagation(); onFolderClick(fpath, row); });
    row.addEventListener('dblclick', e => { e.stopPropagation(); startRename(row, fpath, null); });
    row.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e, fpath, null); });

    folderTree.appendChild(row);

    if (isExpanded || filter) {
      for (const nname of Object.keys(folder.notes || {}).sort()) {
        if (filter && !nname.toLowerCase().includes(filter) && !matchFolder) continue;
        const nrow = document.createElement('div');
        nrow.className = 'tree-item';
        nrow.dataset.path = JSON.stringify(fpath);
        nrow.dataset.note = nname;

        const isOpen = state.tiles.some(t => t.path && t.name && JSON.stringify(t.path) === JSON.stringify(fpath) && t.name === nname);
        if (isOpen) nrow.classList.add('selected');

        let nhtml = '';
        for (let i = 0; i <= depth; i++) nhtml += '<span class="indent"></span>';
        nhtml += '<span class="toggle-icon"> </span>';
        nhtml += '<span class="item-icon">📄</span>';
        nhtml += `<span class="item-name">${escHtml(nname)}</span>`;
        nrow.innerHTML = nhtml;

        // ── DRAG & DROP SETUP ──
        nrow.draggable = true;
        nrow.addEventListener('dragstart', e => {
          e.dataTransfer.setData('text/plain', JSON.stringify({ path: fpath, name: nname }));
          e.dataTransfer.effectAllowed = 'move';
        });

        nrow.addEventListener('click', e => { e.stopPropagation(); openNoteInFocusedTile(fpath, nname); });
        nrow.addEventListener('dblclick', e => { e.stopPropagation(); startRename(nrow, fpath, nname); });
        nrow.addEventListener('contextmenu', e => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e, fpath, nname); });

        folderTree.appendChild(nrow);
      }

      if (folder.subfolders) {
        renderFolderLevel(folder.subfolders, fpath, depth + 1, filter);
      }
    }
  }
}

// ── DROP HANDLING ──────────────────────────────────────────
tileContainer.addEventListener('dragover', e => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
});

tileContainer.addEventListener('drop', e => {
  e.preventDefault();
  const raw = e.dataTransfer.getData('text/plain');
  if (!raw) return;
  let data;
  try { data = JSON.parse(raw); } catch { return; }
  if (!data.path || !data.name) return;

  // Check if dropped onto an existing tile
  const targetEl = document.elementFromPoint(e.clientX, e.clientY);
  const tileEl = targetEl?.closest('.tile');
  let targetTile = null;
  if (tileEl) {
    const id = Number(tileEl.dataset.tileId);
    targetTile = state.tiles.find(t => t.id === id);
  }

  if (targetTile) {
    openNoteInTile(targetTile, data.path, data.name);
  } else {
    // Drop on background → new tile
    const content = getNoteContent(data.path, data.name);
    const tile = createTile({
      path: data.path,
      name: data.name,
      content: content,
      isNew: false,
    });
    focusTile(tile.id);
  }
});

function getAllNamesUnder(folder) {
  const names = [];
  if (folder.notes) names.push(...Object.keys(folder.notes));
  if (folder.subfolders) {
    for (const sf of Object.values(folder.subfolders)) {
      names.push(...getAllNamesUnder(sf));
    }
  }
  return names;
}

function onFolderClick(fpath, row) {
  state.selectedFolder = fpath;
  const key = JSON.stringify(fpath);
  if (expandedPaths.has(key)) expandedPaths.delete(key);
  else expandedPaths.add(key);
  renderTree();
}

// ── RENAME ────────────────────────────────────────────────────
function startRename(row, fpath, nname) {
  const nameEl = row.querySelector('.item-name');
  const oldName = nname || fpath[fpath.length - 1];
  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = oldName;
  nameEl.replaceWith(input);
  input.focus(); input.select();

  const finish = async () => {
    const newName = input.value.trim();
    input.blur();
    if (!newName || newName === oldName) { renderTree(); return; }
    if (nname) {
      let finalName = sanitizeName(newName);
      if (!finalName.includes('.')) finalName += '.txt';
      renameNote(fpath, nname, finalName);
      state.tiles.forEach(t => {
        if (t.path && JSON.stringify(t.path) === JSON.stringify(fpath) && t.name === nname) {
          t.name = finalName;
        }
      });
    } else {
      const { parent, key } = getFolderParentAndKey(fpath);
      if (parent && !parent[newName]) {
        parent[newName] = parent[key];
        delete parent[key];
        if (state.selectedFolder && JSON.stringify(state.selectedFolder) === JSON.stringify(fpath)) {
          const nf = [...state.selectedFolder];
          nf[state.selectedFolder.length - 1] = newName;
          state.selectedFolder = nf;
        }
        state.tiles.forEach(t => {
          if (t.path && JSON.stringify(t.path.slice(0, fpath.length)) === JSON.stringify(fpath)) {
            const newPath = [...t.path];
            newPath[fpath.length - 1] = newName;
            t.path = newPath;
          }
        });
      }
    }
    saveData();
    renderTree();
    renderTiles();
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); finish(); }
    if (e.key === 'Escape') renderTree();
  });
}

// ── CREATE FOLDER ──────────────────────────────────────────
async function createFolder(parentPath) {
  const name = await showModal('New folder name:');
  if (!name) return;
  const sanitized = sanitizeName(name);
  if (parentPath && parentPath.length > 0) {
    ensureFolderPath(parentPath);
    const parent = getFolderAtPath(parentPath);
    if (!parent.subfolders) parent.subfolders = {};
    if (!parent.subfolders[sanitized]) {
      parent.subfolders[sanitized] = { subfolders: {}, notes: {} };
    }
    expandedPaths.add(JSON.stringify(parentPath));
  } else {
    if (!state.data.folders[sanitized]) {
      state.data.folders[sanitized] = { subfolders: {}, notes: {} };
    }
  }
  saveData();
  renderTree();
}

// ── DELETE ──────────────────────────────────────────────────
let ctxTarget = null;

async function deleteSelected() {
  const sel = state.selectedItem;
  if (!sel) return;

  if (sel.isFolder) {
    if (sel.path.length === 1 && sel.path[0] === 'Misc') return;
    const ok = confirm(`Delete folder "${sel.path[sel.path.length-1]}" and all its contents?`);
    if (!ok) return;
    const { parent, key } = getFolderParentAndKey(sel.path);
    if (parent) delete parent[key];
    state.selectedFolder = null;
    state.tiles = state.tiles.filter(t => {
      if (t.path && JSON.stringify(t.path.slice(0, sel.path.length)) === JSON.stringify(sel.path)) {
        t.path = ['Misc'];
        t.name = null;
        t.content = '';
        t.isNew = true;
        return true;
      }
      return true;
    });
    state.selectedItem = null;
  } else {
    const ok = confirm(`Delete note "${sel.name}"?`);
    if (!ok) return;
    deleteNote(sel.path, sel.name);
    state.tiles = state.tiles.filter(t => {
      if (t.path && JSON.stringify(t.path) === JSON.stringify(sel.path) && t.name === sel.name) {
        t.path = ['Misc'];
        t.name = null;
        t.content = '';
        t.isNew = true;
        return true;
      }
      return true;
    });
    state.selectedItem = null;
  }
  saveData();
  renderTree();
  renderTiles();
}

// ── CONTEXT MENU ───────────────────────────────────────────
function showCtxMenu(e, fpath, nname) {
  ctxTarget = { fpath, nname };
  state.selectedItem = nname
    ? { path: fpath, name: nname, isFolder: false }
    : { path: fpath, isFolder: true };
  renderTree();

  const isNote = !!nname;
  document.getElementById('ctx-new-note').style.display = isNote ? 'none' : 'block';
  document.getElementById('ctx-new-subfolder').style.display = isNote ? 'none' : 'block';

  ctxMenu.style.display = 'block';
  ctxMenu.style.left = Math.min(e.clientX, window.innerWidth - 170) + 'px';
  ctxMenu.style.top = Math.min(e.clientY, window.innerHeight - 150) + 'px';
}
function hideCtxMenu() { ctxMenu.style.display = 'none'; ctxTarget = null; }
document.addEventListener('click', hideCtxMenu);
document.addEventListener('contextmenu', hideCtxMenu);

document.getElementById('ctx-rename').addEventListener('click', () => {
  if (!ctxTarget) return;
  const rows = folderTree.querySelectorAll('.tree-item');
  for (const row of rows) {
    const rpath = JSON.parse(row.dataset.path);
    const rnote = row.dataset.note;
    if (ctxTarget.nname && rnote === ctxTarget.nname && JSON.stringify(rpath) === JSON.stringify(ctxTarget.fpath)) {
      startRename(row, rpath, rnote); return;
    }
    if (!ctxTarget.nname && !rnote && JSON.stringify(rpath) === JSON.stringify(ctxTarget.fpath)) {
      startRename(row, rpath, null); return;
    }
  }
});
document.getElementById('ctx-new-note').addEventListener('click', async () => {
  if (!ctxTarget) return;
  state.selectedFolder = ctxTarget.fpath;
  newNoteTile();
});
document.getElementById('ctx-new-subfolder').addEventListener('click', () => {
  if (!ctxTarget) return;
  createFolder(ctxTarget.fpath);
});
document.getElementById('ctx-delete').addEventListener('click', () => {
  if (!ctxTarget) return;
  if (ctxTarget.nname) {
    state.selectedItem = { path: ctxTarget.fpath, name: ctxTarget.nname, isFolder: false };
  } else {
    state.selectedItem = { path: ctxTarget.fpath, isFolder: true };
  }
  deleteSelected();
});

// ── APPEND ──────────────────────────────────────────────────
function doAppend() {
  const text = appendInput.value.trim();
  if (!text) return;
  const line = `> [${timeHHMM()}] ${text}`;
  const focused = getFocusedTile();
  if (!focused) return;
  const cur = focused.content;
  focused.content = cur + (cur && !cur.endsWith('\n') ? '\n' : '') + line + '\n';
  if (!state.ephemeral) scheduleTileSave(focused.id);
  renderTiles();
  const el = document.querySelector(`.tile[data-tile-id="${focused.id}"] .tile-content`);
  if (el) el.focus();
  appendInput.value = '';
}

// ── SAVE TO MISC ───────────────────────────────────────────
function saveToMisc() {
  const focused = getFocusedTile();
  if (!focused) return;
  const content = focused.content;
  const name = nowStamp() + '.txt';
  ensureFolderPath(['Misc']);
  state.data.folders['Misc'].notes[name] = content;
  saveData();
  renderTree();
}

// ── EPHEMERAL TOGGLE ──────────────────────────────────────
function toggleEphemeral() {
  state.ephemeral = !state.ephemeral;
  document.body.classList.toggle('ephemeral', state.ephemeral);
  ephBadge.style.display = state.ephemeral ? 'inline-block' : 'none';
  btnEph.classList.toggle('active', state.ephemeral);
  renderTiles();
}

// ── EXPORT / IMPORT ──────────────────────────────────────
function exportJSON() {
  const json = JSON.stringify(state.data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = nowStamp().replace(/ /g, '_');
  a.href = url;
  a.download = `memory-buffer-${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function triggerImport() {
  document.getElementById('import-file-input').click();
}

document.getElementById('import-file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const parsed = JSON.parse(evt.target.result);
      if (!parsed.folders) throw new Error('Invalid format: missing "folders" key.');
      const ok = confirm(`Load "${file.name}"?\n\nThis will REPLACE your current notes.`);
      if (!ok) return;
      state.data = parsed;
      if (!state.data.folders['Misc']) {
        state.data.folders['Misc'] = { subfolders: {}, notes: {} };
      }
      saveData();
      state.tiles = [];
      const tile = createTile({ path: ['Misc'], content: '', isNew: true });
      state.focusedTileId = tile.id;
      renderTiles();
      renderTree();
    } catch(err) {
      alert('Failed to load file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ── UTILS ──────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const resizeHandle = document.getElementById('resize-handle');
const leftPanel = document.getElementById('left-panel');
let resizing = false, startX = 0, startW = 0;
resizeHandle.addEventListener('mousedown', e => {
  resizing = true; startX = e.clientX; startW = leftPanel.offsetWidth;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

  resizing = false;
  document.body.style.cursor = '';

});

// ── INIT ────────────────────────────────────────────────────
function init() {
  const stored = loadData();
  state.data = stored || defaultData();

  if (!state.data.folders['Misc']) {
    state.data.folders['Misc'] = { subfolders: {}, notes: {} };
  }

  if (!stored) {
    state.data.folders['Informatics'].notes['Welcome.txt'] =
      '# Welcome to Memory Buffer\n\nTiled edition — drag & drop notes!\n\nShortcuts:\n  Ctrl+N       New tile\n  Ctrl+E       Toggle ephemeral\n  Ctrl+S       Save focused tile\n  Ctrl+M       Save to Misc\n  Ctrl+K       Focus search\n  Ctrl+↓       Focus append bar\n  Ctrl+Enter   Append thought\n  F2           Rename selected\n  Del          Delete selected\n  Ctrl+Shift+F New folder\n\nDrag a note from the tree onto a tile or the empty workspace.';
    saveData();
  }

  for (const fname of Object.keys(state.data.folders)) {
    expandedPaths.add(JSON.stringify([fname]));
  }

  const tile = createTile({ path: ['Misc'], content: '', isNew: true });
  state.focusedTileId = tile.id;
  renderTiles();
  renderTree();
  focusTile(tile.id);
}

// ── FINAL KEYBOARD LISTENER (replaces the previous one) ──
// We'll remove the previous listener and attach a new one.
// Since it's already attached, we'll override the listener by removing the old one.
// Actually, since we're in a script, we can just overwrite the listener.
// I'll replace the entire keydown listener with this refined version.

// Remove previous listeners by replacing the function.
document.removeEventListener('keydown', document._mbKeydown);
document._mbKeydown = function(e) {
  if (modalOverlay.classList.contains('open')) return;
  const ctrl = e.ctrlKey || e.metaKey;

  // -- Append bar focus (Ctrl+↓) --
  if (ctrl && e.key === 'ArrowDown') {
    const tag = document.activeElement?.tagName;
    // If we're inside a tile textarea, focus append input
    if (tag === 'TEXTAREA' && document.activeElement?.closest('.tile')) {
      e.preventDefault();
      appendInput.focus();
      return;
    }
  }

  // -- Tile navigation (Ctrl+Arrows) --
  if (ctrl && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    const tag = document.activeElement?.tagName;
    // Don't intercept if focus is inside an input/textarea (let text editing shortcuts work)
    if (tag === 'INPUT' || tag === 'TEXTAREA') {
      // But allow if it's the folder search? Actually, if they're in search, they might want to nav.
      // If activeElement is folder-search, we allow tile nav.
      if (document.activeElement !== folderSearch) {
        return; // let default behavior (e.g., word jumps in textarea)
      }
    }

    e.preventDefault();
    const currentId = state.focusedTileId;
    const idx = state.tiles.findIndex(t => t.id === currentId);
    if (idx === -1) return;

    let newIdx = idx;
    if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      newIdx = (idx - 1 + state.tiles.length) % state.tiles.length;
    } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      newIdx = (idx + 1) % state.tiles.length;
    }
    const targetTile = state.tiles[newIdx];
    if (targetTile) focusTile(targetTile.id);
    return;
  }

  // -- Other shortcuts --
  if (ctrl && e.key === 'n') { e.preventDefault(); newNoteTile(); return; }
  if (ctrl && e.key === 'e') { e.preventDefault(); toggleEphemeral(); return; }
  if (ctrl && e.key === 'm') { e.preventDefault(); saveToMisc(); return; }
  if (ctrl && e.key === 's') {
    e.preventDefault();
    const focused = getFocusedTile();
    if (focused && !state.ephemeral) persistTile(focused);
    return;
  }
  if (ctrl && e.shiftKey && e.key === 'F') { e.preventDefault(); createFolder(state.selectedFolder); return; }
  if (ctrl && e.key === 'k') { e.preventDefault(); folderSearch.focus(); folderSearch.select(); return; }
  if (ctrl && e.key === 'Enter') { e.preventDefault(); doAppend(); return; }

  // F2 rename
  if (e.key === 'F2') {
    e.preventDefault();
    const sel = state.selectedItem;
    if (!sel) return;
    const rows = folderTree.querySelectorAll('.tree-item');
    for (const row of rows) {
      const rpath = JSON.parse(row.dataset.path);
      const rnote = row.dataset.note;
      if (sel.isFolder && !rnote && JSON.stringify(rpath) === JSON.stringify(sel.path)) {
        startRename(row, rpath, null); return;
      }
      if (!sel.isFolder && rnote === sel.name && JSON.stringify(rpath) === JSON.stringify(sel.path)) {
        startRename(row, rpath, rnote); return;
      }
    }
    return;
  }

  if (e.key === 'Delete' && document.activeElement?.tagName !== 'TEXTAREA' && document.activeElement?.tagName !== 'INPUT') {
    e.preventDefault();
    deleteSelected();
    return;
  }

  if (e.key === 'Escape') {
    if (document.activeElement === appendInput) {
      appendInput.value = '';
      const focused = getFocusedTile();
      if (focused) {
        const el = document.querySelector(`.tile[data-tile-id="${focused.id}"] .tile-content`);
        if (el) el.focus();
      }
    }
  }
};
document.addEventListener('keydown', document._mbKeydown);

init();
</script>
</body>
</html>
